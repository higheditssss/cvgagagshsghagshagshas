<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Kick Chat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;600;700;800;900&family=Oswald:wght@400;600;700&family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;600;700;800;900&family=Bebas+Neue&family=Exo+2:wght@400;600;700;800;900&family=Orbitron:wght@400;600;700;900&family=Black+Ops+One&family=Russo+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#53fc18;--r:#ff3b5c;--p:#a970ff;--b:#1f8bff;--gold:#ffca3a;
  --text:#fff;--mute:#aaa;--border:#2a2c31;
  --fs:14px;
  --sh:0 1px 4px rgba(0,0,0,1),0 0 10px rgba(0,0,0,.8);
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;font-feature-settings:'kern' 1,'liga' 1;}
html,body{height:100%;background:transparent !important;color:var(--text);
  font-family:'Inter',system-ui,sans-serif;font-size:var(--fs);overflow:hidden;}
/* Dark bg only when opened directly in browser without a channel */
body.standalone-preview{background:#0c0c10 !important;}

/* ===== CHAT ===== */
#chat{position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:flex-end;padding:8px 0 10px;overflow:hidden;
  transition:padding-top .28s cubic-bezier(.2,.8,.2,1);}

/* ===== DEBUG ===== */
#debug{position:fixed;top:6px;left:6px;right:6px;padding:8px 12px;
  background:rgba(83,252,24,.1);border:1px solid rgba(83,252,24,.3);
  border-radius:8px;font-size:11px;color:var(--g);font-family:monospace;
  z-index:999;display:none;}
#debug.show{display:block;}
#debug.err{background:rgba(255,59,92,.1);border-color:rgba(255,59,92,.3);color:var(--r);}

/* ===== MESSAGES ===== */
.msg{
  padding:3px 12px;line-height:1.6;word-wrap:break-word;
  font-size:var(--fs);flex-shrink:0;
  will-change:transform,opacity;
  transition:opacity .2s ease,transform .22s cubic-bezier(.2,.8,.2,1);}
.msg.entering{opacity:0;transform:translateY(10px);}
.evt.entering{opacity:0;transform:translateY(10px);}

/* badges — shadow to pop off any background */
.msg .badges{display:inline-flex;gap:2px;margin-right:4px;vertical-align:middle;}
.msg .badge{display:inline-flex;width:18px;height:18px;flex-shrink:0;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,1)) drop-shadow(0 0 6px rgba(0,0,0,.8));}
.msg .badge img{width:18px;height:18px;object-fit:contain;}

/* username — 900 weight, shadow */
.msg .user{font-weight:900;text-shadow:var(--sh);letter-spacing:.01em;}
.msg .colon{color:rgba(255,255,255,.35);margin:0 1px;}

/* message text — 700, shadow everywhere */
.msg .txt{font-weight:700;color:#fff;text-shadow:var(--sh);}
.msg img.emote{height:28px;vertical-align:middle;margin:-4px 1px;display:inline-block;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.8));}

/* ===== REPLY ===== */
.msg .reply-wrap{
  display:block;margin:2px 0 5px 2px;
  padding:5px 10px 5px 11px;
  border-left:3px solid rgba(255,255,255,.35);
  border-radius:0 7px 7px 0;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(4px);
  max-width:100%;overflow:hidden;}
.msg .reply-name{
  font-size:11px;font-weight:800;color:rgba(255,255,255,.75);
  display:block;margin-bottom:2px;text-shadow:var(--sh);}
.msg .reply-text{
  font-size:11px;color:rgba(255,255,255,.45);text-shadow:var(--sh);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}

/* ===== DELETE ===== */
.msg.deleting{pointer-events:none;
  transition:opacity .25s ease,transform .25s ease !important;
  opacity:0 !important;transform:translateX(-12px) scale(.98) !important;}

/* ===== AUTO-HIDE ===== */
.hiding{pointer-events:none;
  transition:opacity .28s ease !important;
  opacity:0 !important;}

/* ===== EVENTS ===== */
.evt{margin:5px 10px;padding:10px 14px;border-radius:12px;flex-shrink:0;
  text-shadow:var(--sh);overflow:hidden;will-change:transform,opacity;
  transition:opacity .2s ease,transform .22s cubic-bezier(.2,.8,.2,1);
  background:rgba(83,252,24,.07);
  border:1px solid rgba(83,252,24,.2);border-left:3px solid var(--g);}
.evt.gift{background:rgba(255,202,58,.08);border-color:rgba(255,202,58,.22);border-left-color:var(--gold);}
.evt.host{background:rgba(169,112,255,.08);border-color:rgba(169,112,255,.22);border-left-color:var(--p);}
.evt.ban{background:rgba(255,59,92,.06);border-color:rgba(255,59,92,.18);border-left-color:var(--r);}
.evt.reward{background:rgba(169,112,255,.1);border-color:rgba(169,112,255,.3);border-left-color:var(--p);}
.evt-head{font-size:9.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;
  margin-bottom:5px;color:var(--g);}
.evt.gift .evt-head{color:var(--gold);}
.evt.host .evt-head{color:var(--p);}
.evt.ban .evt-head{color:var(--r);}
.evt.reward .evt-head{color:var(--p);}
.evt-body{font-size:13px;line-height:1.5;font-weight:600;color:rgba(255,255,255,.92);}
.evt strong{color:#fff;font-weight:800;}

/* ===== SUB / RESUB ===== */
.evt.sub{background:rgba(31,139,255,.1);
  border:1px solid rgba(31,139,255,.3);border-left:3px solid #4da3ff;
  padding:0;overflow:hidden;}
.sub-card{display:flex;align-items:center;gap:12px;padding:10px 14px;}
.sub-avatar{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#1f8bff,#0044bb);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
  border:2px solid rgba(77,163,255,.4);box-shadow:0 0 12px rgba(31,139,255,.2);}
.sub-info{flex:1;min-width:0;}
.sub-label{font-size:9px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:#4da3ff;margin-bottom:2px;}
.sub-name{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sub-detail{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;}
.sub-badge-pill{background:rgba(31,139,255,.15);border:1px solid rgba(77,163,255,.3);
  border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;color:#4da3ff;flex-shrink:0;}
.sub-msg{padding:6px 14px 10px 62px;font-size:12px;color:rgba(255,255,255,.6);
  font-style:italic;border-top:1px solid rgba(77,163,255,.12);}

/* ===== PINNED MESSAGE — SOLID, COMPACT ===== */
#pinned-msg{
  position:fixed;top:0;left:0;z-index:100;
  background:#181510;
  border:1px solid rgba(255,202,58,.6);
  border-left:3px solid var(--gold);
  border-radius:0 0 10px 0;
  box-shadow:0 2px 20px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);
  padding:6px 14px 6px 10px;
  font-size:12.5px;line-height:1.4;
  text-shadow:var(--sh);
  display:none;
  white-space:nowrap;
  max-width:calc(100% - 8px);
  overflow:hidden;
  opacity:0;
  transition:opacity .28s ease,transform .28s cubic-bezier(.2,.8,.2,1);
  transform:translateY(-10px);
}
#pinned-msg.show{
  display:flex;align-items:center;gap:7px;
  opacity:1;transform:translateY(0);}
#pinned-msg .pin-icon{font-size:11px;flex-shrink:0;}
#pinned-msg .pin-user{font-weight:900;color:var(--gold);flex-shrink:0;font-size:12.5px;}
#pinned-msg .pin-sep{color:rgba(255,255,255,.25);flex-shrink:0;}
#pinned-msg .pin-body{font-size:12.5px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#pinned-msg .pin-body img.emote{height:14px !important;width:auto !important;vertical-align:middle;margin:-1px 1px;}

/* ===== REWARD ===== */
.reward-body{display:flex;align-items:center;gap:10px;}
.reward-icon{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--p),#6a3fa0);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.reward-info{flex:1;}
.reward-title{font-weight:800;color:#fff;font-size:13px;margin-bottom:1px;}
.reward-user{font-size:11px;color:rgba(255,255,255,.5);}
.reward-cost{font-size:11px;font-weight:700;color:var(--p);
  background:rgba(169,112,255,.15);padding:2px 7px;border-radius:20px;
  border:1px solid rgba(169,112,255,.3);}
.reward-input{margin-top:7px;font-size:12px;background:rgba(0,0,0,.25);
  padding:5px 10px;border-radius:6px;border-left:2px solid var(--p);}

/* ===== BUBBLE THEME ===== */
body.theme-bubble #chat{padding:6px 10px 12px;}
body.theme-bubble .msg{padding:0;margin-bottom:8px;background:transparent !important;}
body.theme-bubble .msg .bubble-inner{
  display:inline-flex;flex-direction:column;max-width:100%;
  position:relative;overflow:hidden;border-radius:18px;
  padding:8px 14px 9px;word-break:break-word;
  background-image:url('pedro.png');background-size:cover;background-position:center top;
  box-shadow:inset 0 0 0 1000px rgba(10,10,18,.78),0 3px 16px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.1);}
body.theme-bubble .msg .bubble-header{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
body.theme-bubble .msg .bubble-header .badges{display:inline-flex;gap:2px;vertical-align:middle;}
body.theme-bubble .msg .bubble-header .user{font-size:11px;font-weight:900;letter-spacing:.02em;}
body.theme-bubble .msg .bubble-text{font-size:var(--fs);line-height:1.45;font-weight:700;}
body.theme-bubble .msg .bubble-text .emote{height:24px;vertical-align:middle;margin:-3px 1px;}
body.theme-bubble .msg .reply-wrap{font-size:10.5px;border-left-color:rgba(255,255,255,.2);}
body.theme-bubble .evt{margin:4px 0;}
/* paw only in bubble */
body.theme-bubble .msg .paw{display:inline-block;margin-left:3px;vertical-align:middle;
  opacity:.45;width:.85em;height:.85em;animation:pawbounce 2.2s ease-in-out infinite;}
body.theme-bubble .msg .paw svg{width:100%;height:100%;display:block;}
@keyframes pawbounce{0%,100%{transform:rotate(-8deg) scale(1);}50%{transform:rotate(8deg) scale(1.12);}}

/* ===== ANIMATIONS ===== */
/* NOTE: :not(.entering) ensures animation fires only after entry */
.anim-pop-in .msg:not(.entering),.anim-pop-in .evt:not(.entering){animation:pop .35s cubic-bezier(.34,1.4,.64,1);transform-origin:left bottom;}
@keyframes pop{0%{opacity:0;transform:scale(.82) translateY(8px);}65%{opacity:1;transform:scale(1.03);}100%{transform:scale(1);}}
.anim-slide-left .msg:not(.entering),.anim-slide-left .evt:not(.entering){animation:sl .3s cubic-bezier(.2,.8,.2,1);}
@keyframes sl{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:none;}}
.anim-slide-right .msg:not(.entering),.anim-slide-right .evt:not(.entering){animation:sr .3s cubic-bezier(.2,.8,.2,1);}
@keyframes sr{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.anim-slide-up .msg:not(.entering),.anim-slide-up .evt:not(.entering){animation:su .3s cubic-bezier(.2,.8,.2,1);}
@keyframes su{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.anim-fade .msg:not(.entering),.anim-fade .evt:not(.entering){animation:fade .3s ease-out;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.anim-zoom .msg:not(.entering),.anim-zoom .evt:not(.entering){animation:zm .3s cubic-bezier(.2,.8,.2,1);}
@keyframes zm{from{opacity:0;transform:scale(.3);}to{opacity:1;transform:scale(1);}}
.anim-blur .msg:not(.entering),.anim-blur .evt:not(.entering){animation:bl .4s ease-out;}
@keyframes bl{from{opacity:0;filter:blur(10px);}to{opacity:1;filter:blur(0);}}
.anim-bounce .msg:not(.entering),.anim-bounce .evt:not(.entering){animation:bn .55s cubic-bezier(.68,-.55,.27,1.55);}
@keyframes bn{0%{opacity:0;transform:translateY(24px);}50%{opacity:1;transform:translateY(-6px);}100%{transform:none;}}
.anim-glitch .msg:not(.entering),.anim-glitch .evt:not(.entering){animation:gl .4s steps(5,end);}
@keyframes gl{0%{opacity:0;transform:translate(-4px,0);}20%{opacity:.8;transform:translate(4px,-1px);}40%{opacity:.6;transform:translate(-3px,1px);filter:hue-rotate(90deg);}60%{opacity:.9;transform:translate(2px,0);}80%{opacity:1;transform:translate(-1px,0);}100%{opacity:1;transform:none;filter:none;}}
.anim-typewriter .msg:not(.entering),.anim-typewriter .evt:not(.entering){animation:tw .45s steps(22,end);}
@keyframes tw{from{opacity:0;clip-path:inset(0 100% 0 0);}to{opacity:1;clip-path:inset(0 0% 0 0);}}
.anim-flip .msg:not(.entering),.anim-flip .evt:not(.entering){animation:fp .4s cubic-bezier(.2,.8,.2,1);}
@keyframes fp{from{opacity:0;transform:perspective(400px) rotateX(-80deg) translateY(-8px);}to{opacity:1;transform:perspective(400px) rotateX(0);}}
.anim-shake .msg:not(.entering),.anim-shake .evt:not(.entering){animation:sk .5s ease;}
@keyframes sk{0%{opacity:0;transform:translateX(-10px);}20%{opacity:1;transform:translateX(7px);}40%{transform:translateX(-5px);}60%{transform:translateX(4px);}80%{transform:translateX(-2px);}100%{transform:none;}}
.anim-rise .msg:not(.entering),.anim-rise .evt:not(.entering){animation:rs .45s cubic-bezier(.2,.8,.2,1);}
@keyframes rs{from{opacity:0;transform:translateY(120%);filter:blur(3px);}60%{opacity:1;}to{opacity:1;transform:none;filter:none;}}
.anim-swing .msg:not(.entering),.anim-swing .evt:not(.entering){animation:sw .5s cubic-bezier(.2,.8,.2,1);transform-origin:top left;}
@keyframes sw{0%{opacity:0;transform:rotate(-10deg) translateY(-10px);}60%{opacity:1;transform:rotate(2deg);}100%{transform:rotate(0);}}
.anim-neon .msg:not(.entering),.anim-neon .evt:not(.entering){animation:nn .55s ease;}
@keyframes nn{0%{opacity:0;filter:brightness(0) blur(6px);}35%{opacity:.6;filter:brightness(3) blur(2px);}65%{opacity:1;filter:brightness(1.8) blur(0);}100%{filter:brightness(1);}}
.anim-drop .msg:not(.entering),.anim-drop .evt:not(.entering){animation:dr .35s cubic-bezier(.4,-0.3,.2,1.4);}
@keyframes dr{from{opacity:0;transform:translateY(-20px) scale(.95);}to{opacity:1;transform:none;}}
.anim-roll .msg:not(.entering),.anim-roll .evt:not(.entering){animation:ro .4s cubic-bezier(.2,.8,.2,1);}
@keyframes ro{from{opacity:0;transform:translateX(-16px) rotate(-3deg);}to{opacity:1;transform:none;}}
.anim-none .msg,.anim-none .evt{animation:none;}

/* GPU composite */
.msg,.evt{transform:translateZ(0);backface-visibility:hidden;}
</style>
</head>

/* ===== ADD — smooth GPU transitions ===== */
function add(el){
  el.classList.add('entering');
  chat.appendChild(el);
  el.getBoundingClientRect(); // force reflow
  requestAnimationFrame(()=>el.classList.remove('entering'));
  while(chat.children.length>MAX){
    const old=chat.firstChild;
    if(old&&old.parentNode)old.parentNode.removeChild(old);
  }
  if(AUTO_HIDE&&(el.classList.contains('msg')||el.classList.contains('evt'))){
    setTimeout(()=>{
      if(!el.parentNode)return;
      el.classList.add('hiding');
      setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},300);
    },HIDE_SEC*1000);
  }
}

/* ===== BADGE HELPERS ===== */
function getSubBadgeSrc(months){
  if(!subBadges.length)return GLOBAL_BADGE.subscriber;
  let best=subBadges[0];
  for(const b of subBadges)if(months>=b.months&&b.months>=best.months)best=b;
  return best.src||GLOBAL_BADGE.subscriber;
}

function renderBadges(identity){
  if(!identity||!identity.badges)return '';
  return identity.badges.slice(0,6).map(b=>{
    const t=(b.type||'').toLowerCase();
    if(t==='subscriber'){
      if(b.badge_image&&b.badge_image.src)return `<span class="badge"><img src="${esc(b.badge_image.src)}" alt="sub"></span>`;
      return `<span class="badge"><img src="${getSubBadgeSrc(b.months||b.count||1)}" alt="sub"></span>`;
    }
    if(t==='sub_gifter'||t==='subgifter'){
      const c=b.gifted_months||b.count||0;
      let k='subgifter';
      if(c>=200)k='subgifter200';else if(c>=100)k='subgifter100';else if(c>=50)k='subgifter50';else if(c>=25)k='subgifter25';
      return GLOBAL_BADGE[k]?`<span class="badge"><img src="${GLOBAL_BADGE[k]}" alt="gift"></span>`:'';
    }
    return GLOBAL_BADGE[t]?`<span class="badge"><img src="${GLOBAL_BADGE[t]}" alt="${t}"></span>`:'';
  }).join('');
}

function renderText(text){
  let html=text.replace(/\[emote:(\d+):([^\]]+)\]/g,(m,id,n)=>`<img class="emote" src="https://files.kick.com/emotes/${id}/fullsize" alt="${esc(n)}">`);
  return html.split(/(<img[^>]+>)/g).map(p=>{
    if(p.startsWith('<img'))return p;
    return esc(p).replace(/\S+/g,w=>{const u=emotes.get(w);return u?`<img class="emote" src="${u}" alt="${esc(w)}">`:w;});
  }).join('');
}

/* ===== MESSAGE HANDLER ===== */
function onMsg(d){
  const data=parse(d),s=data.sender||{};
  const name=s.username||'anon';
  const color=(s.identity&&s.identity.color)||userColor(name);
  const el=document.createElement('div');
  el.className='msg';
  if(data.id)el.dataset.id=data.id;
  let html='';
  const replyHtml=()=>{
    if(!data.metadata?.original_sender)return '';
    const orig=data.metadata.original_sender.username||'';
    const oMsg=data.metadata.original_message?.content||'';
    return `<span class="reply-wrap"><span class="reply-name">↩ ${esc(orig)}</span><span class="reply-text">${esc(oMsg.slice(0,120))}</span></span>`;
  };
  if(THEME==='bubble'){
    html=`<div class="bubble-inner">${replyHtml()}<div class="bubble-header"><span class="badges">${renderBadges(s.identity)}</span><span class="user" style="color:${color}">${esc(name)}</span></div><div class="bubble-text">${renderText(data.content||'')}<span class="paw"><svg viewBox="0 0 24 24" fill="currentColor"><ellipse cx="6" cy="7.5" rx="2.2" ry="2.8"/><ellipse cx="18" cy="7.5" rx="2.2" ry="2.8"/><ellipse cx="10" cy="4" rx="1.8" ry="2.4"/><ellipse cx="14" cy="4" rx="1.8" ry="2.4"/><path d="M12 10.5c-3.5 0-6.5 2.2-6.5 5 0 1.8 1.5 3 3.5 3h6c2 0 3.5-1.2 3.5-3 0-2.8-3-5-6.5-5z"/></svg></span></div></div>`;
  } else {
    html=replyHtml()+`<span class="badges">${renderBadges(s.identity)}</span><span class="user" style="color:${color}">${esc(name)}</span><span class="colon">: </span><span class="txt">${renderText(data.content||'')}</span>`;
  }
  el.innerHTML=html;add(el);
}

function onDel(d){
  const data=parse(d),id=data.message?.id;
  if(!id)return;
  const el=chat.querySelector(`.msg[data-id="${id}"]`);
  if(el){el.classList.add('deleting');setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},280);}
}

function evtEl(cls,head,body){

function onSub(d){

  const m=data.months||1,isResub=m>1;

  el.innerHTML=`<div class="sub-card"><div class="sub-avatar">${isResub?'🔁':'⭐'}</div><div class="sub-info"><div class="sub-label">${isResub?'★ resub':'★ new sub'}</div><div class="sub-name">${esc(u)}</div><div class="sub-detail">${isResub?`resub · ${m} lun${m===1?'ă':'i'} consecutive`:'subscriber nou'}</div></div><div class="sub-badge-pill">x${m}</div></div>${msg?`<div class="sub-msg">💬 ${esc(msg)}</div>`:''}`;

}

/* ===== PIN — SOLID, CLEAN ===== */
function onPin(d){
  const data=parse(d),m=data.message||{},u=(m.sender?.username)||'?';
  const pinEl=document.getElementById('pinned-msg');
  pinEl.innerHTML=`<span class="pin-icon">📌</span><span class="pin-user">${esc(u)}</span><span class="pin-sep">·</span><span class="pin-body">${renderText(m.content||'')}</span>`;
  // Show: first set display, then on next frame enable transition
  pinEl.style.display='flex';
  pinEl.style.alignItems='center';
  pinEl.style.gap='7px';
  pinEl.getBoundingClientRect(); // force reflow
  pinEl.classList.add('show');
  requestAnimationFrame(()=>{
    chat.style.paddingTop=(pinEl.offsetHeight+6)+'px';
  });
}
function onUnpin(){
  const pinEl=document.getElementById('pinned-msg');
  if(!pinEl.classList.contains('show'))return;
  // Remove show class → transition kicks in (opacity 0, translateY -10px)
  pinEl.classList.remove('show');
  // After transition completes, hide element
  setTimeout(()=>{
    pinEl.style.display='none';
    pinEl.innerHTML='';
    chat.style.paddingTop='';
  },300);
}

function onReward(d){

/* ===== 7TV ===== */
function eu(e){
  const host=e.data?.host||e.host;
  if(host?.url){
    const files=host.files||[];
    const pick=fmt=>files.filter(x=>x.format===fmt).sort((a,b)=>b.width-a.width);
    const avif=pick('AVIF'),webp=pick('WEBP');
    const p=avif[1]||avif[0]||webp[1]||webp[0];
    if(p)return 'https:'+host.url+'/'+p.name;
  }
  const id=e.id||(e.data?.id);
  return id?`https://cdn.7tv.app/emote/${id}/2x.webp`:null;
}

function register7tvSet(set){
  if(!set)return 0;
  const list=Array.isArray(set)?set:(set.emotes||[]);
  let n=0;
  list.forEach(e=>{
    const name=e.name||(e.data?.name);
    const url=eu(e);
    if(name&&url){emotes.set(name,url);n++;}
  });
  return n;
}

async function load7tv(uid){
  let total=0;
  try{
    const g=await fetch('https://7tv.io/v3/emote-sets/global',{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():null);
    if(g){total+=register7tvSet(g);log('[7TV] global: '+register7tvSet(g));}
  }catch(e){log('[7TV] global err',true);}
  if(uid){
    try{
      const u=await fetch(`https://7tv.io/v3/users/KICK/${uid}`,{signal:AbortSignal.timeout(8000)}).then(r=>r.ok?r.json():null);
      if(u){
        if(u.emote_set){total+=register7tvSet(u.emote_set);log('[7TV] channel set loaded');}
        for(const conn of(u.connections||[])){
          if(conn.emote_set_id&&conn.emote_set_id!==u.emote_set?.id){
            try{const es=await fetch(`https://7tv.io/v3/emote-sets/${conn.emote_set_id}`,{signal:AbortSignal.timeout(5000)}).then(r=>r.ok?r.json():null);if(es)total+=register7tvSet(es);}catch(e){}
          }
        }
      }
    }catch(e){log('[7TV] channel err',true);}
  }
  log('[7TV] done: '+emotes.size+' emotes');
}

/* ===== PUSHER ===== */
function loadPusher(){
  return new Promise((res,rej)=>{
    if(window.Pusher)return res();
    const s=document.createElement('script');
    s.src='https://js.pusher.com/7.0/pusher.min.js';
    s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

async function connectPusher(crid,chid){
  await loadPusher();
  pusher=new Pusher('32cbd69e4b950bf97679',{cluster:'us2',wsHost:'ws-us2.pusher.com',enabledTransports:['ws','wss']});
  pusher.connection.bind('connected',()=>log('Pusher connected · crid='+crid));
  pusher.connection.bind('error',e=>log('Pusher err: '+JSON.stringify(e),true));
  if(crid){
    const a=pusher.subscribe(`chatrooms.${crid}.v2`);
    const b=pusher.subscribe(`chatroom_${crid}`);
    function handle(name,d){
      if(name.startsWith('pusher:'))return;
      if(DEBUG)console.log('[kick]',name);
      if(name.includes('ChatMessageEvent'))onMsg(d);
      else if(name.includes('MessageDeletedEvent'))onDel(d);
      else if(name.includes('UserBannedEvent'))onBan(d);
      else if(name.includes('PinnedMessageCreated')||name.includes('PinnedMessage.Created'))onPin(d);
      else if(name.includes('PinnedMessageDeleted')||name.includes('PinnedMessage.Deleted')||name.toLowerCase().includes('unpin')||name.includes('PinnedMessageClearedEvent'))onUnpin();
      else if(name.includes('SubscriptionEvent'))onSub(d);
      else if(name.includes('GiftedSubscriptionsEvent')||name.includes('GiftsLeaderboard'))onGift(d);
      else if(name.includes('RewardRedeemed'))onReward(d);
    }
    a.bind_global(handle);
    b.bind_global(handle);
  }
  if(chid){
    const c=pusher.subscribe(`channel.${chid}`);
    c.bind_global((name,d)=>{if(!name.startsWith('pusher:')&&name.includes('StreamHostEvent'))onHost(d);});
  }
}

async function tryFetch(url){
  try{const r=await fetch(url,{headers:{'Accept':'application/json'}});if(r.ok){const j=await r.json();if(j&&j.id)return j;}}catch(e){}
  for(const px of[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`]){
    try{const r=await fetch(px(url),{signal:AbortSignal.timeout(5000)});if(r.ok){const t=await r.text();try{const j=JSON.parse(t);if(j&&j.id)return j;}catch(e){}}}catch(e){}
  }
  return null;
}

function cacheSubBadges(d){
  const arr=d.subscriber_badges||d.subscriberBadges||[];
  if(!arr.length)return;
  subBadges=arr.map(b=>({months:b.months||b.month||1,src:(b.badge_image?.src)||b.image||b.src||null})).filter(b=>b.src).sort((a,b)=>a.months-b.months);
}

async function fetchIds(slug){
  let j=await tryFetch(`https://kick.com/api/v2/channels/${slug}`);
  if(j?.chatroom){cacheSubBadges(j);return{crid:String(j.chatroom.id),chid:String(j.id),uid:String(j.user_id||j.id)};}
  j=await tryFetch(`https://kick.com/api/v1/channels/${slug}`);
  if(j?.chatroom){cacheSubBadges(j);return{crid:String(j.chatroom.id),chid:String(j.id),uid:String(j.user_id||j.id)};}
  return null;
}

/* ===== TEST ===== */
function injectTestMessages(){
  if(!DEBUG)return;
  const users=[
    {n:'highman',c:'#53fc18',b:[{type:'broadcaster'},{type:'verified'}]},
    {n:'razvwi',c:'#ff6b6b',b:[{type:'moderator'},{type:'sub_gifter',count:100}]},
    {n:'godeanu',c:'#ffca3a',b:[{type:'moderator'},{type:'founder'},{type:'subscriber',months:12}]},
    {n:'test_user',c:'#a970ff',b:[{type:'subscriber',months:3}]},
  ];
  users.forEach((u,i)=>setTimeout(()=>{
    const el=document.createElement('div');el.className='msg';
    el.innerHTML=`<span class="badges">${renderBadges({badges:u.b,color:u.c})}</span><span class="user" style="color:${u.c}">${u.n}</span><span class="colon">: </span><span class="txt">Test message ${i+1} cu emote și text bold ✓</span>`;
    add(el);
  },i*350));
  setTimeout(()=>onSub({username:'test_user',months:1}),2000);
  setTimeout(()=>onSub({username:'razvwi',months:7,message:'PogChamp 7 luni!'}),3000);
  setTimeout(()=>onPin({message:{sender:{username:'highman'},content:'Bine ați venit în stream!'}}),4000);
}

/* ===== START ===== */
async function start(){
  if(!SLUG){log('No channel. Add ?channel=SLUG',true);injectTestMessages();return;}
  log('Starting: '+SLUG);
  let crid=chatroomId,chid=channelId,uid=null;
  // Always fetch channel data to get uid for 7TV + sub badges
  const chan=await tryFetch(`https://kick.com/api/v2/channels/${SLUG}`);
  if(chan){
    cacheSubBadges(chan);
    uid=String(chan.user_id||chan.id||'');
    if(!crid&&chan.chatroom)crid=String(chan.chatroom.id);
    if(!chid)chid=String(chan.id);
  }
  if(!crid){
    log('Fetching IDs...');
    const ids=await fetchIds(SLUG);
    if(ids){crid=ids.crid;chid=ids.chid;if(!uid)uid=ids.uid;}
  }
  if(!crid){log('ERROR: no crid for "'+SLUG+'"',true);injectTestMessages();return;}
  log('IDs OK · crid='+crid+' · uid='+uid);
  load7tv(uid);
  await connectPusher(crid,chid);
  if(DEBUG)setTimeout(injectTestMessages,1000);
}
start();
