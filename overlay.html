<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Kick Chat Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#53fc18;--r:#ff3b5c;--p:#a970ff;--b:#1f8bff;--gold:#ffca3a;
  --text:#efeff1;--mute:#adadb8;--border:#2a2c31;
  --fs:14px;--sh:1px 1px 3px rgba(0,0,0,.75);
}
html,body{height:100%;background:transparent !important;color:var(--text);
  font-family:'Inter',system-ui,sans-serif;font-size:var(--fs);overflow:hidden;}
#chat{position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:flex-end;padding:8px 0 10px;overflow:hidden;}

/* debug banner */
#debug{position:fixed;top:6px;left:6px;right:6px;padding:8px 12px;
  background:rgba(83,252,24,.12);border:1px solid rgba(83,252,24,.35);
  border-radius:8px;font-size:11px;color:var(--g);font-family:monospace;
  z-index:999;display:none;}
#debug.show{display:block;}
#debug.err{background:rgba(255,59,92,.12);border-color:rgba(255,59,92,.4);color:var(--r);}

/* messages */
.msg{padding:4px 12px;line-height:1.5;word-wrap:break-word;
  font-size:var(--fs);text-shadow:var(--sh);flex-shrink:0;}
.msg .badges{display:inline-flex;gap:2px;margin-right:3px;vertical-align:middle;}
.msg .badge{display:inline-flex;width:18px;height:18px;flex-shrink:0;}
.msg .badge img{width:18px;height:18px;object-fit:contain;}
.msg .user{font-weight:700;text-shadow:var(--sh);}
.msg .colon{color:var(--mute);}
.msg img.emote{height:28px;vertical-align:middle;margin:-4px 1px;display:inline-block;}
.msg .reply-ref{display:block;font-size:11px;color:var(--mute);
  padding-left:8px;border-left:2px solid var(--border);margin-bottom:2px;opacity:.8;}

/* delete */
.msg.deleting{animation:del .35s ease forwards;}
@keyframes del{to{opacity:0;transform:translateX(-14px);max-height:0;padding:0;overflow:hidden;}}

/* auto-hide */
.hiding{animation:hide .4s ease forwards;}
@keyframes hide{to{opacity:0;max-height:0;padding:0;overflow:hidden;}}

/* events */
.evt{margin:4px 10px;padding:10px 14px;border-radius:10px;flex-shrink:0;
  text-shadow:var(--sh);border:1px solid rgba(83,252,24,.3);
  background:linear-gradient(135deg,rgba(83,252,24,.15),rgba(83,252,24,.05));}
.evt.sub{background:linear-gradient(135deg,rgba(31,139,255,.15),rgba(31,139,255,.05));border-color:rgba(31,139,255,.3);}
.evt.gift{background:linear-gradient(135deg,rgba(255,202,58,.15),rgba(255,202,58,.05));border-color:rgba(255,202,58,.3);}
.evt.host{background:linear-gradient(135deg,rgba(169,112,255,.15),rgba(169,112,255,.05));border-color:rgba(169,112,255,.3);}
.evt.ban{background:linear-gradient(135deg,rgba(255,59,92,.08),rgba(255,59,92,.03));border-color:rgba(255,59,92,.2);}
.evt.pinned{background:linear-gradient(135deg,rgba(255,202,58,.15),rgba(255,202,58,.05));border-color:rgba(255,202,58,.3);}
.evt.reward{background:linear-gradient(135deg,rgba(169,112,255,.2),rgba(169,112,255,.07));
  border:1px solid rgba(169,112,255,.45);border-left:3px solid var(--p);
  box-shadow:0 0 12px rgba(169,112,255,.12);}
.evt-head{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:5px;color:var(--g);opacity:.85;}
.evt.sub .evt-head{color:#4da3ff;}.evt.gift .evt-head{color:var(--gold);}
.evt.host .evt-head{color:var(--p);}.evt.ban .evt-head{color:var(--r);opacity:.6;}
.evt.reward .evt-head{color:var(--p);}.evt.pinned .evt-head{color:var(--gold);}
.evt-body{font-size:13px;line-height:1.5;}
.evt strong{color:#fff;font-weight:700;}
.reward-body{display:flex;align-items:center;gap:10px;}
.reward-icon{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--p),#6a3fa0);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.reward-info{flex:1;}
.reward-title{font-weight:700;color:#fff;font-size:13px;margin-bottom:1px;}
.reward-user{font-size:11px;color:rgba(255,255,255,.55);}
.reward-cost{font-size:11px;font-weight:700;color:var(--p);
  background:rgba(169,112,255,.15);padding:2px 7px;border-radius:20px;
  border:1px solid rgba(169,112,255,.3);}
.reward-input{margin-top:7px;font-size:12px;background:rgba(0,0,0,.2);
  padding:5px 10px;border-radius:6px;border-left:2px solid var(--p);}

/* animations */
.anim-pop-in .msg,.anim-pop-in .evt{animation:pop .35s cubic-bezier(.34,1.4,.64,1);transform-origin:left bottom;}
@keyframes pop{0%{opacity:0;transform:scale(.85) translateY(6px);}70%{opacity:1;transform:scale(1.02);}100%{transform:scale(1);}}
.anim-slide-left .msg,.anim-slide-left .evt{animation:sl .3s cubic-bezier(.2,.8,.2,1);}
@keyframes sl{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:none;}}
.anim-slide-up .msg,.anim-slide-up .evt{animation:su .3s cubic-bezier(.2,.8,.2,1);}
@keyframes su{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.anim-fade .msg,.anim-fade .evt{animation:fade .25s ease-out;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.anim-zoom .msg,.anim-zoom .evt{animation:zm .3s cubic-bezier(.2,.8,.2,1);}
@keyframes zm{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
.anim-blur .msg,.anim-blur .evt{animation:bl .4s ease-out;}
@keyframes bl{from{opacity:0;filter:blur(6px);}to{opacity:1;filter:blur(0);}}
.anim-bounce .msg,.anim-bounce .evt{animation:bn .5s cubic-bezier(.68,-.55,.27,1.55);}
@keyframes bn{0%{opacity:0;transform:translateY(20px);}50%{opacity:1;transform:translateY(-4px);}100%{transform:none;}}
.anim-glitch .msg,.anim-glitch .evt{animation:gl .4s steps(5,end);}
@keyframes gl{0%{opacity:0;transform:translate(-4px,0);}20%{opacity:.8;transform:translate(3px,-1px);}40%{opacity:.6;transform:translate(-2px,1px);filter:hue-rotate(90deg);}60%{opacity:.9;transform:translate(1px,0);}80%{opacity:1;transform:translate(-1px,0);}100%{opacity:1;transform:none;filter:none;}}
.anim-none .msg,.anim-none .evt{animation:none;}
</style>
</head>

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function parse(d){if(typeof d==='string'){try{return JSON.parse(d);}catch(e){return{};}}return d||{};}
function userColor(n){
  const c=['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa0','#dda0dd','#98d8c8','#f7dc6f','#82e0aa','#7fb3d3','#f1948a','#85c1e9','#a9dfbf','#f9e79f','#d2b4de'];
  let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);
  return c[Math.abs(h)%c.length];
}

function add(el){
  chat.appendChild(el);
  while(chat.children.length>MAX)chat.removeChild(chat.firstChild);
  if(AUTO_HIDE&&(el.classList.contains('msg')||el.classList.contains('evt'))){
    setTimeout(()=>{
      if(!el.parentNode)return;
      el.classList.add('hiding');
      setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},420);
    },HIDE_SEC*1000);
  }
}

/* ===== Get subscriber badge image for a given month count =====
   Uses the streamer's custom sub badges (preloaded), falling back to global subscriber badge. */
function getSubBadgeSrc(months){
  if(!subBadges.length)return GLOBAL_BADGE.subscriber;
  // find the highest tier the user qualifies for
  let best=subBadges[0];
  for(const b of subBadges){
    if(months>=b.months && b.months>=best.months) best=b;
  }
  return best.src||GLOBAL_BADGE.subscriber;
}

function renderBadges(identity){
  if(!identity||!identity.badges)return '';
  return identity.badges.slice(0,6).map(b=>{
    const t=(b.type||'').toLowerCase();
    // Subscriber badge - prefer API-provided image, fallback to cached streamer tiers by month count
    if(t==='subscriber'){
      if(b.badge_image&&b.badge_image.src){
        return `<span class="badge"><img src="${esc(b.badge_image.src)}" alt="sub"></span>`;
      }
      const months=b.months||b.count||1;
      const src=getSubBadgeSrc(months);
      return `<span class="badge"><img src="${src}" alt="sub"></span>`;
    }
    // Sub gifter tiers
    if(t==='sub_gifter'||t==='subgifter'){
      const c2=b.gifted_months||b.count||0;
      let k='subgifter';
      if(c2>=200)k='subgifter200';else if(c2>=100)k='subgifter100';
      else if(c2>=50)k='subgifter50';else if(c2>=25)k='subgifter25';
      return GLOBAL_BADGE[k]?`<span class="badge"><img src="${GLOBAL_BADGE[k]}" alt="gift"></span>`:'';
    }
    // Generic badge lookup
    return GLOBAL_BADGE[t]?`<span class="badge"><img src="${GLOBAL_BADGE[t]}" alt="${t}"></span>`:'';
  }).join('');
}

function renderText(text){
  let html=text.replace(/\[emote:(\d+):([^\]]+)\]/g,(m,id,n)=>`<img class="emote" src="https://files.kick.com/emotes/${id}/fullsize" alt="${esc(n)}">`);
  return html.split(/(<img[^>]+>)/g).map(p=>{
    if(p.startsWith('<img'))return p;
    return esc(p).replace(/\S+/g,w=>{const u=emotes.get(w);return u?`<img class="emote" src="${u}" alt="${esc(w)}">`:w;});
  }).join('');
}

function onMsg(d){
  const data=parse(d),s=data.sender||{};
  const name=s.username||'anon';
  const color=(s.identity&&s.identity.color)||userColor(name);
  const el=document.createElement('div');
  el.className='msg';
  if(data.id)el.dataset.id=data.id;
  let html='';
  if(data.metadata&&data.metadata.original_sender){
    const orig=data.metadata.original_sender.username||'';
    const oMsg=(data.metadata.original_message&&data.metadata.original_message.content)||'';
    html+=`<span class="reply-ref">↩ @${esc(orig)}: ${esc(oMsg.slice(0,80))}</span>`;
  }
  html+=`<span class="badges">${renderBadges(s.identity)}</span><span class="user" style="color:${color}">${esc(name)}</span><span class="colon">: </span><span class="txt">${renderText(data.content||'')}</span>`;
  el.innerHTML=html;add(el);
}

function onDel(d){
  const data=parse(d);
  const id=data.message&&data.message.id;
  if(!id)return;
  const el=chat.querySelector(`.msg[data-id="${id}"]`);
  if(el){el.classList.add('deleting');setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},380);}
}

/* ===== 7TV ===== */
// Resolve best URL for a 7TV emote object (prefers AVIF > WEBP, 2x size)
function eu(e){
  const host=e.data?.host||e.host;
  if(host?.url){
    const files=host.files||[];
    // prefer AVIF animated > WEBP animated > AVIF static > WEBP static, at 2x
    const pick=(fmt)=>files.filter(x=>x.format===fmt).sort((a,b)=>a.width-b.width);
    const avif=pick('AVIF');const webp=pick('WEBP');
    const p=avif[1]||avif[0]||webp[1]||webp[0];
    if(p)return 'https:'+host.url+'/'+p.name;
  }
  return `https://cdn.7tv.app/emote/${e.id}/2x.webp`;
}

// Register emotes from an emote-set object ({emotes:[...]})
function register7tvSet(set){
  if(!set||!Array.isArray(set.emotes))return 0;
  let n=0;
  set.emotes.forEach(e=>{
    if(e.name&&(e.data||e.host||e.id)){emotes.set(e.name,eu(e));n++;}
  });
  return n;
}

async function load7tv(uid){
  if(!uid)return;
  let total=0;

  // 1. Global emote set
  try{
    const g=await fetch('https://7tv.io/v3/emote-sets/global',{signal:AbortSignal.timeout(6000)}).then(r=>r.ok?r.json():null);
    if(g)total+=register7tvSet(g);
  }catch(e){log('[7TV] global fetch failed: '+e.message);}

  // 2. Channel-specific emote set via KICK platform user
  try{
    const u=await fetch(`https://7tv.io/v3/users/KICK/${uid}`,{signal:AbortSignal.timeout(6000)}).then(r=>r.ok?r.json():null);
    if(u){
      // Active emote set
      if(u.emote_set)total+=register7tvSet(u.emote_set);
      // All connected emote sets (may include extras)
      if(Array.isArray(u.connections)){
        for(const conn of u.connections){
          if(conn.emote_set_id&&conn.emote_set_id!==u.emote_set?.id){
            try{
              const es=await fetch(`https://7tv.io/v3/emote-sets/${conn.emote_set_id}`,{signal:AbortSignal.timeout(4000)}).then(r=>r.ok?r.json():null);
              if(es)total+=register7tvSet(es);
            }catch(e){}
          }
        }
      }
    }
  }catch(e){log('[7TV] channel fetch failed: '+e.message);}

  log('7TV loaded: '+total+' emotes ('+emotes.size+' total)');
}

/* ===== PUSHER ===== */
function loadPusher(){
  return new Promise((res,rej)=>{
    if(window.Pusher)return res();
    const s=document.createElement('script');
    s.src='https://js.pusher.com/7.0/pusher.min.js';
    s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function connectPusher(crid, chid){
  await loadPusher();
  pusher=new Pusher('32cbd69e4b950bf97679',{
    cluster:'us2',wsHost:'ws-us2.pusher.com',enabledTransports:['ws','wss']
  });

  pusher.connection.bind('connected',()=>log('Pusher connected · crid='+crid));
  pusher.connection.bind('error',e=>log('Pusher error: '+JSON.stringify(e),true));

  if(crid){
    const a=pusher.subscribe(`chatrooms.${crid}.v2`);
    const b=pusher.subscribe(`chatroom_${crid}`);
    a.bind_global((name,d)=>{
      if(name.startsWith('pusher:'))return;
      if(name.includes('ChatMessageEvent'))onMsg(d);
      else if(name.includes('MessageDeletedEvent'))onDel(d);
      else if(name.includes('UserBannedEvent'))onBan(d);
      else if(name.includes('PinnedMessageCreated'))onPin(d);
    });
    b.bind_global((name,d)=>{
      if(name.startsWith('pusher:'))return;
      if(name.includes('SubscriptionEvent'))onSub(d);
      else if(name.includes('GiftedSubscriptionsEvent')||name.includes('GiftsLeaderboard'))onGift(d);
      else if(name.includes('RewardRedeemed'))onReward(d);
    });
  }
  if(chid){
    const c=pusher.subscribe(`channel.${chid}`);
    c.bind_global((name,d)=>{
      if(name.startsWith('pusher:'))return;
      if(name.includes('StreamHostEvent'))onHost(d);
    });
  }
}

/* ===== FETCH CHANNEL — multiple methods ===== */
async function tryFetch(url){
  // Method 1: direct
  try{const r=await fetch(url,{headers:{'Accept':'application/json'}});if(r.ok){const j=await r.json();if(j&&j.id)return j;}}catch(e){}
  // Method 2: proxies
  const proxies=[
    u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u=>`https://thingproxy.freeboard.io/fetch/${u}`,
    u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];
  for(const px of proxies){
    try{
      const r=await fetch(px(url),{signal:AbortSignal.timeout(5000)});
      if(r.ok){const t=await r.text();try{const j=JSON.parse(t);if(j&&j.id)return j;}catch(e){}}
    }catch(e){}
  }
  return null;
}

async function fetchIds(slug){
  // Try v2 API first
  let j=await tryFetch(`https://kick.com/api/v2/channels/${slug}`);
  if(j&&j.chatroom){
    cacheSubBadges(j);
    return{crid:String(j.chatroom.id),chid:String(j.id),uid:String(j.user_id||j.id)};
  }
  // Try v1 API
  j=await tryFetch(`https://kick.com/api/v1/channels/${slug}`);
  if(j&&j.chatroom){
    cacheSubBadges(j);
    return{crid:String(j.chatroom.id),chid:String(j.id),uid:String(j.user_id||j.id)};
  }
  return null;
}

/* ===== Cache streamer's custom subscriber badges (tier 1/2/3/6/12/24 months etc) ===== */
function cacheSubBadges(channelData){
  // Kick channel API returns subscriber_badges: [{months: N, badge_image: {src: url}}]
  const arr=channelData.subscriber_badges||channelData.subscriberBadges||[];
  if(!arr.length)return;
  subBadges=arr.map(b=>({
    months:b.months||b.month||1,
    src:(b.badge_image&&b.badge_image.src)||b.image||b.src||null,
  })).filter(b=>b.src).sort((a,b)=>a.months-b.months);
  log('Loaded '+subBadges.length+' custom sub badge tiers');
}

/* ===== TEST MODE: if ?debug=1, show sample messages so you can see it's alive ===== */
function injectTestMessages(){
  if(!DEBUG)return;
  const users=[
    {n:'highman',c:'#53fc18',b:[{type:'broadcaster'},{type:'verified'}]},
    {n:'razvwi',c:'#ff6b6b',b:[{type:'moderator'},{type:'sub_gifter',count:100}]},
    {n:'godeanu',c:'#ffca3a',b:[{type:'moderator'},{type:'founder'},{type:'subscriber',months:12}]},
    {n:'test_user',c:'#a970ff',b:[{type:'subscriber',months:3}]},
  ];
  users.forEach((u,i)=>{
    setTimeout(()=>{
      const el=document.createElement('div');el.className='msg';
      const identity={badges:u.b,color:u.c};
      el.innerHTML=`<span class="badges">${renderBadges(identity)}</span><span class="user" style="color:${u.c}">${u.n}</span><span class="colon">: </span>Test message ${i+1} ✓`;
      add(el);
    },i*400);
  });
  setTimeout(()=>evtEl('sub','★ subscription','<strong>test_user</strong> s-a abonat · 1 lună'),2000);
}

async function start(){
  if(!SLUG){
    log('No channel specified. Add ?channel=SLUG to URL',true);
    injectTestMessages();
    return;
  }
  log('Starting for channel: '+SLUG);

  let crid=chatroomId, chid=channelId, uid=null;

  // If IDs not in URL, try to fetch them
  if(!crid||!chid){
    log('Fetching IDs from Kick API...');
    const ids=await fetchIds(SLUG);
    if(ids){crid=ids.crid;chid=ids.chid;uid=ids.uid;}
  } else {
    // Even with IDs in URL, try to fetch channel data for sub badges
    tryFetch(`https://kick.com/api/v2/channels/${SLUG}`).then(j=>{if(j)cacheSubBadges(j);});
  }

  if(!crid){
    log('ERROR: Could not get chatroom ID for "'+SLUG+'". Go back to the setup page and click Caută again.',true);
    injectTestMessages();
    return;
  }

  log('IDs OK · crid='+crid+' · chid='+chid);
  if(uid)load7tv(uid);
  await connectPusher(crid, chid);

  // If debug, inject some test messages to verify rendering even before real chat arrives
  if(DEBUG)setTimeout(injectTestMessages,1500);
}

start();
</script>
